# CI for hangar-evals: install the package and run the hangar-independent
# test suite. Tests marked `requires_hangar` need a real the-hangar checkout
# (the $HANGAR_REPO seam) and auto-skip here — see tests/conftest.py.
#
# To run the seam tests in CI later: check out muroc-aero/hangar as a sibling
# `the-hangar` directory, install its packages (openmdao etc.), and export
# HANGAR_REPO — see notes/llm-eval-plan.md for the seam contract.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -ra
