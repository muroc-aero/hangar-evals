# Lane C agent evals as a have-agent study — SANDBOXED, both arms:
# the full 12-case suite x {claude anchor, gemma local}, 1 seed per cell,
# every agent in a colima/docker container with only a scratch workspace
# mounted and omd reached over http (container sandbox REQUIRES http).
#
# Same bridge and run commands as lane_c_eval.yaml — only the file differs:
#
#   HAVE="uv run --project ../the-hangar --with ../have-agent --with-editable .[anchor]"
#   $HAVE have --db muroc.db submit examples/lane_c_eval_sandboxed.yaml
#   $HAVE have --db muroc.db approve <study_id>
#   $HAVE have --db muroc.db worker run --id worker:evals-1 --solvers evals \
#       --executor hangar.evals.have_bridge:make_worker \
#       --executor-opt results_dir=results
#   $HAVE have --db muroc.db report <study_id>
#
# Additional prereqs beyond lane_c_eval.yaml's:
#   - colima running; both sandbox images built (see containers/):
#     hangar-harness:anchor-* (claude arm) and hangar-harness:opencode-* (gemma arm)
#   - CLAUDE_CODE_OAUTH_TOKEN exported in the worker's shell (`claude setup-token`
#     once) — the in-container anchor authenticates with your local Claude Code
#     subscription and the driver refuses to start without it
#   - ollama daemon up with gemma4:26b-mlx pulled (the opencode arm reaches it
#     at host.docker.internal from inside the container)
#
# Expect the gemma arm to be slow: a 26B local model can run each heavy coupled
# case up to its per-case timeout. Crashes retry once (policy.auto_retry_max);
# graded FAILs are final verdicts, not retries.

study: lane_c_eval_sandboxed_v0
title: Lane C agent evals, sandboxed (claude anchor + gemma local arm)
baseline:
  template: evals/lane_c   # informational: the bridge ignores plan_ref;
                           # the prefix routes jobs to --solvers evals workers
acceptance:
  plausibility_suite: lane_c_effect_graded
  min_pass_rate: 1.0       # every seed must pass for a "pass" verdict
policy:
  auto_retry_max: 1        # retries harness crashes, not graded FAILs
  priority: 50

cases:
  # --- claude anchor arm (local Claude Code auth, in-container CLI driver) ---
  - case_id: paraboloid_claude
    overrides: {case: paraboloid, harness: claude, seeds: 1, omd_transport: http, sandbox: container}
  - case_id: oas_aero_rect_claude
    overrides: {case: oas_aero_rect, harness: claude, seeds: 1, omd_transport: http, sandbox: container}
  - case_id: oas_aerostruct_rect_claude
    overrides: {case: oas_aerostruct_rect, harness: claude, seeds: 1, omd_transport: http, sandbox: container}
  - case_id: ocp_caravan_basic_claude
    overrides: {case: ocp_caravan_basic, harness: claude, seeds: 1, omd_transport: http, sandbox: container}
  - case_id: ocp_caravan_full_claude
    overrides: {case: ocp_caravan_full, harness: claude, seeds: 1, omd_transport: http, sandbox: container}
  - case_id: ocp_hybrid_twin_claude
    overrides: {case: ocp_hybrid_twin, harness: claude, seeds: 1, omd_transport: http, sandbox: container}
  - case_id: oas_ocp_combined_claude
    overrides: {case: oas_ocp_combined, harness: claude, seeds: 1, omd_transport: http, sandbox: container}
  - case_id: ocp_oas_coupled_claude
    overrides: {case: ocp_oas_coupled, harness: claude, seeds: 1, omd_transport: http, sandbox: container}
  - case_id: ocp_oas_direct_claude
    overrides: {case: ocp_oas_direct, harness: claude, seeds: 1, omd_transport: http, sandbox: container}
  - case_id: pyc_turbojet_claude
    overrides: {case: pyc_turbojet, harness: claude, seeds: 1, omd_transport: http, sandbox: container}
  - case_id: ocp_three_tool_claude
    overrides: {case: ocp_three_tool, harness: claude, seeds: 1, omd_transport: http, sandbox: container}
  - case_id: evt_native_sizing_claude
    overrides: {case: evt_native_sizing, harness: claude, seeds: 1, omd_transport: http, sandbox: container}

  # --- gemma local arm (OpenCode -> Ollama, docker-wrapped, no env passthrough) ---
  - case_id: paraboloid_gemma
    overrides: {case: paraboloid, harness: opencode, model: "gemma4:26b-mlx", seeds: 1, omd_transport: http, sandbox: container}
  - case_id: oas_aero_rect_gemma
    overrides: {case: oas_aero_rect, harness: opencode, model: "gemma4:26b-mlx", seeds: 1, omd_transport: http, sandbox: container}
  - case_id: oas_aerostruct_rect_gemma
    overrides: {case: oas_aerostruct_rect, harness: opencode, model: "gemma4:26b-mlx", seeds: 1, omd_transport: http, sandbox: container}
  - case_id: ocp_caravan_basic_gemma
    overrides: {case: ocp_caravan_basic, harness: opencode, model: "gemma4:26b-mlx", seeds: 1, omd_transport: http, sandbox: container}
  - case_id: ocp_caravan_full_gemma
    overrides: {case: ocp_caravan_full, harness: opencode, model: "gemma4:26b-mlx", seeds: 1, omd_transport: http, sandbox: container}
  - case_id: ocp_hybrid_twin_gemma
    overrides: {case: ocp_hybrid_twin, harness: opencode, model: "gemma4:26b-mlx", seeds: 1, omd_transport: http, sandbox: container}
  - case_id: oas_ocp_combined_gemma
    overrides: {case: oas_ocp_combined, harness: opencode, model: "gemma4:26b-mlx", seeds: 1, omd_transport: http, sandbox: container}
  - case_id: ocp_oas_coupled_gemma
    overrides: {case: ocp_oas_coupled, harness: opencode, model: "gemma4:26b-mlx", seeds: 1, omd_transport: http, sandbox: container}
  - case_id: ocp_oas_direct_gemma
    overrides: {case: ocp_oas_direct, harness: opencode, model: "gemma4:26b-mlx", seeds: 1, omd_transport: http, sandbox: container}
  - case_id: pyc_turbojet_gemma
    overrides: {case: pyc_turbojet, harness: opencode, model: "gemma4:26b-mlx", seeds: 1, omd_transport: http, sandbox: container}
  - case_id: ocp_three_tool_gemma
    overrides: {case: ocp_three_tool, harness: opencode, model: "gemma4:26b-mlx", seeds: 1, omd_transport: http, sandbox: container}
  - case_id: evt_native_sizing_gemma
    overrides: {case: evt_native_sizing, harness: opencode, model: "gemma4:26b-mlx", seeds: 1, omd_transport: http, sandbox: container}
